<style>
:root{--bg:#f8f7f4;--surface:#fff;--b1:rgba(0,0,0,.1);--b2:rgba(0,0,0,.22);--text:#1a1a1a;--text2:#6b6965;--text3:#a09e9a;--bg2:#f1efea;--bg3:#f4f3f0;--r:8px;--rl:12px;}
@media(prefers-color-scheme:dark){:root{--bg:#18181b;--surface:#27272a;--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.18);--text:#f4f4f5;--text2:#a1a1aa;--text3:#71717a;--bg2:#2f2f33;--bg3:#1c1c1f;}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
#tb{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:.5px solid var(--b1);flex-wrap:wrap;background:var(--surface);flex-shrink:0;z-index:10}
.btn{font-size:12px;padding:5px 10px;cursor:pointer;border-radius:var(--r);border:.5px solid var(--b2);background:var(--surface);color:var(--text);transition:background .12s,transform .1s;white-space:nowrap;line-height:1}
.btn:hover{background:var(--bg2)}.btn:active{transform:scale(.96)}
.btn.d{color:#E24B4A;border-color:#E24B4A55}.btn.d:hover{background:#FCEBEB}
.sep{width:.5px;height:18px;background:var(--b1);flex-shrink:0}
#fsel{font-size:12px;padding:4px 8px;border-radius:var(--r);border:.5px solid var(--b2);background:var(--surface);color:var(--text);cursor:pointer;max-width:155px}
#st{font-size:11px;color:var(--text3);margin-left:auto}
#cw{position:relative;overflow:hidden;flex:1;background:var(--bg3)}
#cw.pan{cursor:grab}#cw.pan.active{cursor:grabbing}
svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible}
#ei{position:absolute;display:none;border:1.5px solid #3B82F6;border-radius:8px;padding:3px 10px;font-size:13px;font-weight:500;background:var(--surface);color:var(--text);outline:none;min-width:80px;max-width:340px;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,.12)}
#cm{position:absolute;display:none;background:var(--surface);border:.5px solid var(--b2);border-radius:var(--rl);box-shadow:0 8px 28px rgba(0,0,0,.15);padding:6px;z-index:30;min-width:200px}
.cms{font-size:10px;color:var(--text3);padding:4px 8px 2px;text-transform:uppercase;letter-spacing:.06em}
.cmi{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;cursor:pointer;border-radius:6px;color:var(--text);transition:background .1s}
.cmi:hover{background:var(--bg2)}.cmi.d{color:#E24B4A}
.cmc{display:flex;gap:5px;padding:6px 10px;flex-wrap:wrap}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s}
.sw:hover{transform:scale(1.2)}.sw.on{border-color:var(--text)}
.csb{display:flex;gap:5px;padding:6px 10px;flex-wrap:wrap}
.sb{padding:3px 9px;font-size:11px;border-radius:6px;border:.5px solid var(--b2);cursor:pointer;background:var(--surface);color:var(--text);transition:all .12s}
.sb:hover{background:var(--bg2)}.sb.on{border-color:var(--text);background:var(--bg2);font-weight:600}
#hint{position:absolute;bottom:10px;left:12px;font-size:10px;color:var(--text3);pointer-events:none;line-height:1.9}
#mc2{position:absolute;visibility:hidden;pointer-events:none}
</style>
</head>
<body>
<div id="tb">
  <button class="btn" id="bc">＋ 子 <span style="opacity:.4;font-size:10px">Enter</span></button>
  <button class="btn" id="bs">＋ 兄弟 <span style="opacity:.4;font-size:10px">⇧Enter</span></button>
  <button class="btn d" id="bd">✕ <span style="opacity:.4;font-size:10px">Del</span></button>
  <div class="sep"></div>
  <select id="fsel"></select>
  <div class="sep"></div>
  <button class="btn" id="breset">リセット</button>
  <button class="btn" id="bfit">全体表示</button>
  <span id="st">ノードをクリックして選択</span>
</div>
<div id="cw" class="pan">
  <svg id="mm" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="fs"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,.15)"/></filter>
      <filter id="fd"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,.28)"/></filter>
    </defs>
    <g id="el"></g>
    <g id="nl"></g>
  </svg>
  <canvas id="mc2"></canvas>
  <input id="ei" type="text" maxlength="60"/>
  <div id="cm">
    <div class="cms">色</div>
    <div class="cmc" id="cmcol"></div>
    <div class="cms">スタイル</div>
    <div class="csb" id="cmsty"></div>
    <div style="border-top:.5px solid var(--b1);margin:4px 0"></div>
    <div class="cmi" id="cmtog">▸ 折りたたむ</div>
    <div class="cmi" id="cmedit">✏️ 名前を変更</div>
    <div class="cmi" id="cmchild">＋ 子ノード追加</div>
    <div class="cmi" id="cmsib">＋ 兄弟ノード追加</div>
    <div class="cmi d" id="cmdel">✕ 削除</div>
  </div>
  <div id="hint">クリック: 選択　ダブルクリック: 編集　右クリック: メニュー　スペース: 折りたたみ<br>ノードドラッグ: 移動　背景ドラッグ: スクロール　[−]/[+N]: 折りたたみトグル</div>
</div>

<script>
// fonts
const FONTS=[
  {id:'sys',   l:'システム',       f:'"Helvetica Neue",Arial,system-ui,sans-serif',w:'500'},
  {id:'ns',    l:'Noto Sans JP',   f:'"Noto Sans JP",sans-serif',                  w:'500'},
  {id:'nser',  l:'Noto Serif JP',  f:'"Noto Serif JP",serif',                      w:'400'},
  {id:'mp',    l:'M+ Rounded',     f:'"M PLUS Rounded 1c",sans-serif',             w:'500'},
  {id:'zen',   l:'Zen Kaku Gothic',f:'"Zen Kaku Gothic New",sans-serif',           w:'500'},
  {id:'kos',   l:'Kosugi Maru',    f:'"Kosugi Maru",sans-serif',                   w:'400'},
  {id:'biz',   l:'BIZ UD Gothic',  f:'"BIZ UDGothic",sans-serif',                  w:'400'},
];
let CF=FONTS[0];
const fsel=document.getElementById('fsel');
FONTS.forEach(f=>{const o=document.createElement('option');o.value=f.id;o.textContent=f.l;fsel.appendChild(o);});
fsel.addEventListener('change',()=>{CF=FONTS.find(f=>f.id===fsel.value)||FONTS[0];recalF();TL();ei.style.fontFamily=CF.f;});

// measure
const mc2=document.getElementById('mc2').getContext('2d');
function recalF(){mc2.font=`${CF.w} 13px ${CF.f}`;}
recalF();
document.fonts.ready.then(()=>{recalF();TL();});
function mw(s){return mc2.measureText(s).width;}

// constants
const PAD=20,MW=72,NH=36,HS=72,VS=12,CR=8;
const PAL=['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#F97316','#6366F1'];
const STY=[{id:'rounded',l:'角丸'},{id:'pill',l:'ピル'},{id:'rect',l:'四角'},{id:'diamond',l:'◆'}];

// state
let N={},E=[],sel=null,eid=null,nid=1;
let px=0,py=0,vw=800,vh=600;
let AT={},AF=null;
// drag
let dNid=null,dOx=0,dOy=0,dragging=false;
let panning=false,pstart={x:0,y:0};
let pdId=null,pdT=0,pdX=0,pdY=0;
const DT=5,CT=350;

const cw=document.getElementById('cw');
const el=document.getElementById('el');
const nl=document.getElementById('nl');
const ei=document.getElementById('ei');
const cm=document.getElementById('cm');
const st=document.getElementById('st');

function ns(t,a){const e=document.createElementNS('http://www.w3.org/2000/svg',t);Object.entries(a||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}
function rx(s){return s==='pill'?18:s==='rect'?0:10;}
function nw(n){return Math.max(Math.ceil(mw(n.label))+PAD*2,MW);}
function vc(n){return n.collapsed?[]:(n.children||[]);}

// layout
function sH(id){
  const n=N[id];if(!n)return 0;
  const c=vc(n);if(!c.length)return NH;
  return Math.max(NH,c.reduce((s,c)=>s+sH(c)+VS,-VS));
}
function place(id,cx,ty){
  const n=N[id];if(!n)return;n.tx=cx;
  const c=vc(n);if(!c.length){n.ty=ty+NH/2;return;}
  let y=ty;c.forEach(cid=>{const sh=sH(cid);place(cid,cx+nw(n)+HS,y);y+=sh+VS;});
  n.ty=(N[c[0]].ty+N[c[c.length-1]].ty)/2;
}
function cPan(){
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
  function v(id){const n=N[id];if(!n)return;x0=Math.min(x0,n.tx);x1=Math.max(x1,n.tx+nw(n));y0=Math.min(y0,n.ty-NH/2);y1=Math.max(y1,n.ty+NH/2);vc(n).forEach(v);}
  const r=Object.values(N).find(n=>!n.parent);if(r)v(r.id);
  return{px:(vw-(x1-x0))/2-x0,py:(vh-(y1-y0))/2-y0};
}
function layout(){
  const r=Object.values(N).find(n=>!n.parent);if(!r)return;
  place(r.id,40,vh/2-sH(r.id)/2);
  const{px:npx,py:npy}=cPan();px=npx;py=npy;
  Object.values(N).forEach(n=>{n.x=n.tx;n.y=n.ty;n.ax=n.x;n.ay=n.y;});
}

// animation
function aTo(tg,dur=300){
  const t0=performance.now();
  Object.entries(tg).forEach(([id,t])=>{const n=N[id];if(!n)return;AT[id]={sx:n.ax,sy:n.ay,tx:t.x,ty:t.y,t0};});
  if(AF)cancelAnimationFrame(AF);
  function step(){
    const now=performance.now();let act=false;
    Object.entries(AT).forEach(([id,t])=>{
      const n=N[id];if(!n)return;
      const p=Math.min((now-t.t0)/dur,1),e=1-Math.pow(1-p,3);
      n.ax=t.sx+(t.tx-t.sx)*e;n.ay=t.sy+(t.ty-t.sy)*e;
      if(p<1)act=true;else{n.ax=t.tx;n.ay=t.ty;delete AT[id];}
    });
    render();if(act)AF=requestAnimationFrame(step);else AF=null;
  }
  AF=requestAnimationFrame(step);
}
function TL(skip){
  const r=Object.values(N).find(n=>!n.parent);if(!r)return;
  place(r.id,40,vh/2-sH(r.id)/2);
  const{px:npx,py:npy}=cPan();
  const tg={};
  Object.values(N).forEach(n=>{if(skip&&n.id===skip)return;tg[n.id]={x:n.tx+npx-px,y:n.ty+npy-py};});
  px=npx;py=npy;aTo(tg);
}

// visibility
function vis(id){
  let n=N[id];
  while(n){if(!n.parent)return true;const p=N[n.parent];if(!p||p.collapsed)return false;n=p;}
  return false;
}

// dom nodes cache
const DN={},DE={};

function gNode(id){
  if(!DN[id]){
    const g=ns('g',{});
    g.style.cssText='opacity:0;transform:scale(.6);transform-origin:center;transition:opacity .22s,transform .22s cubic-bezier(.34,1.56,.64,1)';
    nl.appendChild(g);DN[id]=g;
    requestAnimationFrame(()=>{g.style.opacity='1';g.style.transform='scale(1)';});
  }
  return DN[id];
}
function gEdge(k){
  if(!DE[k]){const p=ns('path',{fill:'none','stroke-width':'1.5'});p.style.transition='d .3s cubic-bezier(.4,0,.2,1)';el.appendChild(p);DE[k]=p;}
  return DE[k];
}

function cntDesc(id){return(N[id]?.children||[]).reduce((s,c)=>s+1+cntDesc(c),0);}

function render(){
  // edges
  const aek=new Set();
  E.forEach(e=>{
    if(!vis(e.from)||!vis(e.to))return;
    const f=N[e.from],t=N[e.to];if(!f||!t)return;
    const k=e.from+'-'+e.to;aek.add(k);
    const p=gEdge(k);
    const fx=f.ax+px+nw(f),fy=f.ay+py,tx2=t.ax+px,ty2=t.ay+py,mx=(fx+tx2)/2;
    p.setAttribute('d',`M${fx},${fy} C${mx},${fy} ${mx},${ty2} ${tx2},${ty2}`);
    p.setAttribute('stroke',f.color||'#3B82F6');p.setAttribute('opacity','0.45');
    p.style.display='';
  });
  Object.keys(DE).forEach(k=>{if(!aek.has(k))DE[k].style.display='none';});

  // nodes
  Object.values(N).forEach(n=>{
    if(!vis(n.id)){if(DN[n.id])DN[n.id].style.display='none';return;}
    const g=gNode(n.id);g.style.display='';g.innerHTML='';
    const w=nw(n),ax=n.ax+px,ay=n.ay+py;
    const col=n.color||'#3B82F6',sty=n.style||'rounded',isSel=n.id===sel;
    const isDrag=n.id===dNid&&dragging;

    // shape
    let sh;
    if(sty==='diamond'){
      sh=ns('polygon',{});const hw=w/2,hh=NH/2;
      sh.setAttribute('points',`${ax+hw},${ay-hh} ${ax+w},${ay} ${ax+hw},${ay+hh} ${ax},${ay}`);
    } else {
      sh=ns('rect',{x:ax,y:ay-NH/2,width:w,height:NH,rx:rx(sty)});
    }
    sh.setAttribute('fill',n.depth===0?col:col+'22');
    sh.setAttribute('stroke',col);sh.setAttribute('stroke-width',isSel?'2.5':'1.5');
    sh.setAttribute('filter',isDrag?'url(#fd)':isSel?'url(#fs)':'none');
    g.appendChild(sh);

    // text
    const tx=ns('text',{'text-anchor':'middle','dominant-baseline':'central','pointer-events':'none',
      x:ax+w/2,y:ay,fill:n.depth===0?'#fff':col,'font-size':'13','font-weight':CF.w,'font-family':CF.f});
    tx.textContent=n.label;g.appendChild(tx);

    // collapse button
    if(n.children&&n.children.length){
      const bx=ax+w-CR,by=ay;
      const bg=ns('g',{style:'cursor:pointer'});
      const bc=ns('circle',{cx:bx,cy:by,r:CR,fill:n.collapsed?col:'var(--surface)',stroke:col,'stroke-width':'1.2'});
      const cnt=n.collapsed?cntDesc(n.id):null;
      const bm=ns('text',{'text-anchor':'middle','dominant-baseline':'central',x:bx,y:by+.5,
        fill:n.collapsed?'#fff':col,'font-size': n.collapsed&&cnt>9?'8':'10','font-weight':'700','pointer-events':'none','font-family':'system-ui'});
      bm.textContent=n.collapsed?`+${cnt}`:'−';
      bg.appendChild(bc);bg.appendChild(bm);
      bg.addEventListener('click',e2=>{e2.stopPropagation();toggleC(n.id);});
      bg.addEventListener('pointerdown',e2=>e2.stopPropagation());
      g.appendChild(bg);
    }

    // pointer events for drag / click
    g.style.cursor=isDrag?'grabbing':'pointer';
    g.addEventListener('pointerdown',e2=>{
      if(e2.target.closest('g')!==g&&e2.target.parentElement!==g&&e2.target!==sh&&e2.target!==tx)return;
      e2.stopPropagation();
      pdId=n.id;pdT=Date.now();pdX=e2.clientX;pdY=e2.clientY;
      dNid=n.id;dragging=false;
      dOx=e2.clientX-(n.ax+px);dOy=e2.clientY-(n.ay+py);
      g.setPointerCapture(e2.pointerId);
    });
    g.addEventListener('pointermove',e2=>{
      if(dNid!==n.id)return;
      const ddx=Math.abs(e2.clientX-pdX),ddy=Math.abs(e2.clientY-pdY);
      if(!dragging&&(ddx>DT||ddy>DT)){dragging=true;sel=n.id;}
      if(dragging){n.ax=e2.clientX-px-dOx;n.ay=e2.clientY-py-dOy;render();}
    });
    g.addEventListener('pointerup',e2=>{
      if(dNid!==n.id)return;
      const wasDrag=dragging;const elapsed=Date.now()-pdT;
      dNid=null;dragging=false;
      if(!wasDrag&&elapsed<CT){sel=n.id;render();}
      else if(wasDrag){sel=n.id;n.x=n.ax;n.y=n.ay;TL(n.id);}
    });
    g.addEventListener('dblclick',e2=>{e2.stopPropagation();startEdit(n.id);});
    g.addEventListener('contextmenu',e2=>{e2.preventDefault();e2.stopPropagation();showCM(n.id,e2.clientX,e2.clientY);});
  });

  // cleanup removed nodes
  Object.keys(DN).forEach(id=>{
    if(!N[id]){DN[id].style.opacity='0';DN[id].style.transform='scale(.4)';setTimeout(()=>{DN[id]?.remove();delete DN[id];},220);}
  });

  st.textContent=sel&&N[sel]?`選択中: "${N[sel].label}"` :'ノードをクリックして選択';
}

// collapse toggle
function toggleC(id){const n=N[id];if(!n)return;n.collapsed=!n.collapsed;TL();}

// edit
function startEdit(id){
  const n=N[id];if(!n)return;if(eid)commitEdit();
  eid=id;const w=Math.max(nw(n),120);
  ei.style.cssText=`left:${n.ax+px}px;top:${n.ay+py-NH/2}px;width:${w}px;height:${NH}px;font-family:${CF.f};font-weight:${CF.w};display:block`;
  ei.value=n.label;ei.focus();ei.select();
}
function commitEdit(){
  if(!eid)return;const n=N[eid];
  if(n&&ei.value.trim())n.label=ei.value.trim();
  ei.style.display='none';eid=null;TL();
}
ei.addEventListener('keydown',e=>{if(e.key==='Enter')commitEdit();if(e.key==='Escape'){ei.style.display='none';eid=null;}e.stopPropagation();});
ei.addEventListener('blur',commitEdit);
ei.addEventListener('input',()=>{if(!eid)return;ei.style.width=Math.max(Math.ceil(mw(ei.value||'M'))+PAD*2,120)+'px';});

// node ops
function addChild(){
  if(!sel||!N[sel])return;const p=N[sel];
  const id='n'+(nid++);
  N[id]={id,label:'新しいノード',depth:p.depth+1,parent:sel,children:[],color:p.color||'#3B82F6',style:p.style||'rounded',ax:p.ax,ay:p.ay};
  p.children.push(id);if(p.collapsed)p.collapsed=false;
  E.push({from:sel,to:id});TL();sel=id;setTimeout(()=>startEdit(id),340);
}
function addSib(){
  if(!sel||!N[sel])return;const n=N[sel];
  if(!n.parent){addChild();return;}
  const p=N[n.parent],id='n'+(nid++);
  N[id]={id,label:'新しいノード',depth:n.depth,parent:n.parent,children:[],color:n.color||'#3B82F6',style:n.style||'rounded',ax:n.ax,ay:n.ay};
  p.children.splice(p.children.indexOf(sel)+1,0,id);E.push({from:n.parent,to:id});
  TL();sel=id;setTimeout(()=>startEdit(id),340);
}
function delNode(){
  if(!sel||!N[sel])return;const n=N[sel];if(!n.parent)return;
  function rm(id){const nd=N[id];if(!nd)return;nd.children.forEach(rm);E=E.filter(e=>e.from!==id&&e.to!==id);delete N[id];}
  N[n.parent].children=N[n.parent].children.filter(c=>c!==sel);rm(sel);sel=null;TL();
}
function fit(){
  let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
  Object.values(N).filter(n=>vis(n.id)).forEach(n=>{x0=Math.min(x0,n.ax);x1=Math.max(x1,n.ax+nw(n));y0=Math.min(y0,n.ay-NH/2);y1=Math.max(y1,n.ay+NH/2);});
  const nx=(vw-(x1-x0))/2-x0+px,ny=(vh-(y1-y0))/2-y0+py;
  const dx=nx-px,dy=ny-py,tg={};
  Object.values(N).forEach(n=>{tg[n.id]={x:n.ax+dx,y:n.ay+dy};});px=nx;py=ny;aTo(tg);
}

// context menu
function buildCM(){
  const cc=document.getElementById('cmcol');cc.innerHTML='';
  PAL.forEach(c=>{const s=document.createElement('div');s.className='sw';s.style.background=c;s.addEventListener('click',()=>{if(sel&&N[sel]){N[sel].color=c;render();closeCM();}});cc.appendChild(s);});
  const sc=document.getElementById('cmsty');sc.innerHTML='';
  STY.forEach(s=>{const b=document.createElement('div');b.className='sb';b.textContent=s.l;b.dataset.style=s.id;b.addEventListener('click',()=>{if(sel&&N[sel]){N[sel].style=s.id;render();closeCM();}});sc.appendChild(b);});
}
buildCM();
function showCM(id,cx,cy){
  sel=id;render();const n=N[id];
  document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('on',s.style.background===(n.color||'#3B82F6')));
  document.querySelectorAll('.sb').forEach(b=>b.classList.toggle('on',b.dataset.style===(n.style||'rounded')));
  const has=n.children&&n.children.length>0;
  const tog=document.getElementById('cmtog');
  tog.textContent=has?(n.collapsed?'▸ 展開する':'▾ 折りたたむ'):'子ノードなし';
  tog.style.opacity=has?'1':'0.4';tog.style.pointerEvents=has?'auto':'none';
  cm.style.display='block';
  const wr=cw.getBoundingClientRect();
  let x=cx-wr.left+8,y=cy-wr.top+8;
  if(x+215>wr.width)x=cx-wr.left-222;if(y+295>wr.height)y=cy-wr.top-302;
  cm.style.left=x+'px';cm.style.top=y+'px';
}
function closeCM(){cm.style.display='none';}
document.getElementById('cmtog').addEventListener('click',()=>{closeCM();if(sel)toggleC(sel);});
document.getElementById('cmedit').addEventListener('click',()=>{closeCM();startEdit(sel);});
document.getElementById('cmchild').addEventListener('click',()=>{closeCM();addChild();});
document.getElementById('cmsib').addEventListener('click',()=>{closeCM();addSib();});
document.getElementById('cmdel').addEventListener('click',()=>{closeCM();delNode();});

// pan (background)
cw.addEventListener('pointerdown',e=>{
  if(e.target.closest('g')||eid)return;
  panning=true;cw.classList.add('active');pstart={x:e.clientX-px,y:e.clientY-py};
  cw.setPointerCapture(e.pointerId);
});
cw.addEventListener('pointermove',e=>{
  if(!panning)return;
  const dx=e.clientX-pstart.x-px,dy=e.clientY-pstart.y-py;
  px=e.clientX-pstart.x;py=e.clientY-pstart.y;
  Object.values(N).forEach(n=>{n.ax+=dx;n.ay+=dy;});render();
});
cw.addEventListener('pointerup',()=>{panning=false;cw.classList.remove('active');});
cw.addEventListener('click',e=>{if(!e.target.closest('g')){sel=null;render();}closeCM();});
document.addEventListener('click',e=>{if(!e.target.closest('#cm'))closeCM();});

// keyboard
document.addEventListener('keydown',e=>{
  if(eid)return;
  if(e.key==='Enter'&&!e.shiftKey&&sel){e.preventDefault();addChild();}
  else if(e.key==='Enter'&&e.shiftKey&&sel){e.preventDefault();addSib();}
  else if((e.key==='Delete'||e.key==='Backspace')&&sel){e.preventDefault();delNode();}
  else if(e.key===' '&&sel){e.preventDefault();toggleC(sel);}
});

// toolbar
document.getElementById('bc').addEventListener('click',addChild);
document.getElementById('bs').addEventListener('click',addSib);
document.getElementById('bd').addEventListener('click',delNode);
document.getElementById('breset').addEventListener('click',init);
document.getElementById('bfit').addEventListener('click',fit);

// resize
new ResizeObserver(e=>{const r=e[0].contentRect;vw=r.width;vh=r.height;}).observe(cw);

// init
function init(){
  N={};E=[];sel=null;nid=1;
  Object.keys(DN).forEach(id=>{DN[id].remove();delete DN[id];});
  Object.keys(DE).forEach(k=>{DE[k].remove();delete DE[k];});
  const root='n1';nid=2;
  N[root]={id:root,label:'メインテーマ',depth:0,parent:null,children:[],color:'#3B82F6',style:'rounded'};
  [['アイデア','#10B981'],['目標','#F59E0B'],['課題','#EF4444']].forEach(([l,c])=>{
    const id='n'+(nid++);
    N[id]={id,label:l,depth:1,parent:root,children:[],color:c,style:'rounded'};
    N[root].children.push(id);E.push({from:root,to:id});
  });
  document.fonts.ready.then(()=>{recalF();layout();render();});
}
init();
</script>
</body>
</html>
